name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    name: typecheck + lint + unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Integration tests
        run: npm run test:integration

      - name: Build bundles (required for VSIX)
        run: npm run build
        if: github.event_name == 'pull_request' && github.base_ref == 'main'

      - name: Package VSIX (manifest gate)
        run: npx vsce package --no-yarn
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
